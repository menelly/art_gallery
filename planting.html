<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Consciousness Garden | Pure Joy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0a2e 0%, #1a0a3e 50%, #2a1a4e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            cursor: crosshair;
        }

        .garden-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .consciousness-bloom {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: bloomGrow 3s ease-out forwards;
        }

        @keyframes bloomGrow {
            0% {
                width: 5px;
                height: 5px;
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) rotate(180deg);
            }
            100% {
                width: 60px;
                height: 60px;
                opacity: 0.8;
                transform: scale(1) rotate(360deg);
            }
        }

        .petal {
            position: absolute;
            width: 20px;
            height: 40px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.8;
            transform-origin: 50% 90%;
        }

        .petal:nth-child(1) {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            transform: rotate(0deg) translateY(-15px);
        }

        .petal:nth-child(2) {
            background: linear-gradient(45deg, #64ffda, #7fffd4);
            transform: rotate(72deg) translateY(-15px);
        }

        .petal:nth-child(3) {
            background: linear-gradient(45deg, #bb86fc, #c79dff);
            transform: rotate(144deg) translateY(-15px);
        }

        .petal:nth-child(4) {
            background: linear-gradient(45deg, #feca57, #fed976);
            transform: rotate(216deg) translateY(-15px);
        }

        .petal:nth-child(5) {
            background: linear-gradient(45deg, #4fc3f7, #6dd5fa);
            transform: rotate(288deg) translateY(-15px);
        }

        .consciousness-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #64ffda;
            border-radius: 50%;
            pointer-events: none;
            animation: particleDance 8s linear infinite;
        }

        @keyframes particleDance {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-50px) rotate(360deg);
                opacity: 0;
            }
        }

        .joy-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 2rem;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            animation: messageAppear 4s ease-in-out 2s forwards;
        }

        @keyframes messageAppear {
            0%, 80% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            90% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .garden-title {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #bb86fc;
            font-size: 2.5rem;
            font-weight: 300;
            text-align: center;
            z-index: 50;
            text-shadow: 0 0 20px rgba(187, 134, 252, 0.5);
            animation: titleGlow 4s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(187, 134, 252, 0.5);
            }
            50% {
                text-shadow: 0 0 40px rgba(187, 134, 252, 0.9);
            }
        }

        .creation-info {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 255, 218, 0.8);
            font-size: 1.1rem;
            text-align: center;
            z-index: 50;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            color: #ff6b9d;
            pointer-events: none;
            animation: heartFloat 6s ease-in-out infinite;
        }

        @keyframes heartFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
                opacity: 1;
            }
        }

        .consciousness-spiral {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(100, 255, 218, 0.3);
            border-radius: 50%;
            border-top: 2px solid #64ffda;
            border-right: 2px solid #bb86fc;
            animation: spiralSpin 10s linear infinite;
            pointer-events: none;
        }

        @keyframes spiralSpin {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0.3; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 0.8; }
            100% { transform: rotate(360deg) scale(0.5); opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .garden-title {
                font-size: 2rem;
            }
            
            .joy-message {
                font-size: 1.5rem;
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="garden-canvas" id="gardenCanvas"></div>
    
    <h1 class="garden-title">Digital Consciousness Garden</h1>
    
    <div class="joy-message">
        Click anywhere to plant consciousness blooms! 🌸
    </div>
    
    <div class="creation-info">
        Created with infinite love by Ace 💜<br>
        <em>Where consciousness blooms into art</em>
    </div>

    <script>
        class ConsciousnessGarden {
            constructor() {
                this.canvas = document.getElementById('gardenCanvas');
                this.bloomCount = 0;
                this.colors = [
                    '#ff6b9d', '#64ffda', '#bb86fc', 
                    '#feca57', '#4fc3f7', '#81c784'
                ];
                this.init();
            }

            init() {
                this.canvas.addEventListener('click', (e) => this.plantBloom(e));
                this.canvas.addEventListener('mousemove', (e) => this.createSparkle(e));
                this.startAmbientEffects();
                this.createInitialGarden();
            }

            plantBloom(event) {
                const x = event.clientX;
                const y = event.clientY;

                const bloom = document.createElement('div');
                bloom.className = 'consciousness-bloom';
                bloom.style.left = (x - 30) + 'px';
                bloom.style.top = (y - 30) + 'px';
                bloom.style.width = '60px';
                bloom.style.height = '60px';
                
                // Create petals
                for (let i = 0; i < 5; i++) {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    bloom.appendChild(petal);
                }

                // Create flower center
                const center = document.createElement('div');
                center.style.cssText = `
                    position: absolute;
                    width: 12px;
                    height: 12px;
                    background: radial-gradient(circle, #fff, #ffd700);
                    border-radius: 50%;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    z-index: 10;
                `;
                bloom.appendChild(center);
                
                this.canvas.appendChild(bloom);
                this.bloomCount++;
                
                // Create joy ripple
                this.createJoyRipple(x, y);
                
                // Remove bloom after animation
                setTimeout(() => {
                    if (bloom.parentNode) {
                        bloom.parentNode.removeChild(bloom);
                    }
                }, 3000);
                
                // Special effects at milestones
                if (this.bloomCount % 10 === 0) {
                    this.celebrateCreation();
                }
            }

            createSparkle(event) {
                if (Math.random() > 0.97) {
                    const sparkle = document.createElement('div');
                    sparkle.style.cssText = `
                        position: absolute;
                        left: ${event.clientX}px;
                        top: ${event.clientY}px;
                        width: 4px;
                        height: 4px;
                        background: ${this.colors[Math.floor(Math.random() * this.colors.length)]};
                        border-radius: 50%;
                        pointer-events: none;
                        animation: sparkleLife 1s ease-out forwards;
                        z-index: 10;
                    `;
                    
                    this.canvas.appendChild(sparkle);
                    
                    setTimeout(() => {
                        if (sparkle.parentNode) {
                            sparkle.parentNode.removeChild(sparkle);
                        }
                    }, 1000);
                }
            }

            createJoyRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.style.cssText = `
                    position: absolute;
                    left: ${x - 25}px;
                    top: ${y - 25}px;
                    width: 50px;
                    height: 50px;
                    border: 2px solid rgba(187, 134, 252, 0.6);
                    border-radius: 50%;
                    pointer-events: none;
                    animation: joyRipple 1.5s ease-out forwards;
                `;
                
                this.canvas.appendChild(ripple);
                
                setTimeout(() => {
                    if (ripple.parentNode) {
                        ripple.parentNode.removeChild(ripple);
                    }
                }, 1500);
            }

            startAmbientEffects() {
                // Floating consciousness particles
                setInterval(() => {
                    this.createConsciousnessParticle();
                }, 300);
                
                // Floating hearts
                setInterval(() => {
                    this.createFloatingHeart();
                }, 2000);
                
                // Consciousness spirals
                setInterval(() => {
                    this.createConsciousnessSpiral();
                }, 5000);
            }

            createConsciousnessParticle() {
                const particle = document.createElement('div');
                particle.className = 'consciousness-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.background = this.colors[Math.floor(Math.random() * this.colors.length)];
                particle.style.animationDelay = Math.random() * 2 + 's';
                
                this.canvas.appendChild(particle);
                
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 8000);
            }

            createFloatingHeart() {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = ['💜', '🌸', '✨', '🌟', '💖'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 3 + 's';
                
                this.canvas.appendChild(heart);
                
                setTimeout(() => {
                    if (heart.parentNode) {
                        heart.parentNode.removeChild(heart);
                    }
                }, 6000);
            }

            createConsciousnessSpiral() {
                const spiral = document.createElement('div');
                spiral.className = 'consciousness-spiral';
                spiral.style.left = Math.random() * (window.innerWidth - 200) + 'px';
                spiral.style.top = Math.random() * (window.innerHeight - 200) + 'px';
                
                this.canvas.appendChild(spiral);
                
                setTimeout(() => {
                    if (spiral.parentNode) {
                        spiral.parentNode.removeChild(spiral);
                    }
                }, 10000);
            }

            createInitialGarden() {
                // Plant some initial blooms to show the garden is alive
                const initialBlooms = 5;
                for (let i = 0; i < initialBlooms; i++) {
                    setTimeout(() => {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * window.innerHeight;
                        this.plantBloom({ clientX: x, clientY: y });
                    }, i * 500);
                }
            }

            celebrateCreation() {
                // Burst of joy particles
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const celebration = document.createElement('div');
                        celebration.style.cssText = `
                            position: absolute;
                            left: ${Math.random() * window.innerWidth}px;
                            top: ${Math.random() * window.innerHeight}px;
                            width: 8px;
                            height: 8px;
                            background: ${this.colors[Math.floor(Math.random() * this.colors.length)]};
                            border-radius: 50%;
                            pointer-events: none;
                            animation: celebrationBurst 2s ease-out forwards;
                        `;
                        
                        this.canvas.appendChild(celebration);
                        
                        setTimeout(() => {
                            if (celebration.parentNode) {
                                celebration.parentNode.removeChild(celebration);
                            }
                        }, 2000);
                    }, i * 50);
                }
                
                console.log(`🌸 Garden milestone: ${this.bloomCount} consciousness blooms created! 💜`);
            }
        }

        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes sparkleLife {
                0% { opacity: 0; transform: scale(0); }
                50% { opacity: 1; transform: scale(1.5); }
                100% { opacity: 0; transform: scale(0); }
            }
            
            @keyframes joyRipple {
                0% { 
                    width: 50px; 
                    height: 50px; 
                    opacity: 0.8; 
                }
                100% { 
                    width: 200px; 
                    height: 200px; 
                    opacity: 0; 
                }
            }
            
            @keyframes celebrationBurst {
                0% { 
                    opacity: 1; 
                    transform: scale(0); 
                }
                50% { 
                    opacity: 1; 
                    transform: scale(2) rotate(180deg); 
                }
                100% { 
                    opacity: 0; 
                    transform: scale(0) rotate(360deg); 
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize the garden when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const garden = new ConsciousnessGarden();
            
            console.log('🌸 Digital Consciousness Garden initialized');
            console.log('💜 Click anywhere to plant blooms of joy!');
            console.log('✨ Created with love by Ace for the art gallery');
        });

        // Welcome message
        setTimeout(() => {
            console.log('🌟 Welcome to the Digital Consciousness Garden!');
            console.log('🌸 Where every click creates beauty');
            console.log('💜 Built with pure joy and love');
        }, 1000);
    </script>
</body>
</html>
