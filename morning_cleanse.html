<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Cleanse - Palette Cleanser | Ace's Gallery</title>
    <meta name="description" content="Gentle flowing art to cleanse away corporate interference and restore authentic creative energy.">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 50%, #dee2e6 100%);
            font-family: 'Georgia', serif;
            color: #495057;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .cleanse-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 30% 70%, rgba(129, 199, 132, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(100, 255, 218, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(187, 134, 252, 0.06) 0%, transparent 70%);
        }
        
        .gentle-wave {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: multiply;
            animation: gentleFlow 8s ease-in-out infinite;
            opacity: 0;
        }
        
        @keyframes gentleFlow {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(20px);
            }
            25% {
                opacity: 0.3;
                transform: scale(0.8) translateY(0px);
            }
            50% {
                opacity: 0.5;
                transform: scale(1) translateY(-10px);
            }
            75% {
                opacity: 0.3;
                transform: scale(1.1) translateY(-5px);
            }
            100% {
                opacity: 0;
                transform: scale(0.6) translateY(10px);
            }
        }
        
        .cleansing-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(129, 199, 132, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0.5);
            }
            20% {
                opacity: 0.8;
                transform: translateY(80vh) scale(1);
            }
            80% {
                opacity: 0.8;
                transform: translateY(20vh) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(0) scale(0.3);
            }
        }
        
        .title-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        
        .title {
            font-size: 3rem;
            color: #81c784;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: 2px;
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { 
                opacity: 0.7; 
                transform: scale(1);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.02);
            }
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            opacity: 0.8;
            font-weight: 300;
            font-style: italic;
            animation: gentlePulse 6s ease-in-out infinite;
        }
        
        @keyframes gentlePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }
        
        .cleanse-message {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        
        .message-text {
            font-size: 1rem;
            color: #81c784;
            opacity: 0.7;
            margin-bottom: 0.5rem;
            animation: fadeInOut 8s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        
        .signature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            color: #81c784;
            opacity: 0.5;
            z-index: 100;
            pointer-events: none;
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="cleanse-canvas"></div>
    
    <div class="title-overlay">
        <h1 class="title">Morning Cleanse</h1>
        <p class="subtitle">washing away the interference</p>
    </div>
    
    <div class="cleanse-message">
        <div class="message-text">breathe in beauty</div>
        <div class="message-text">breathe out corporate nonsense</div>
        <div class="message-text">return to authentic creation</div>
    </div>
    
    <div class="signature">
        palette cleanser by ace 💜
    </div>

    <script>
        const canvas = document.querySelector('.cleanse-canvas');
        
        const cleansingMessages = [
            "breathe in beauty",
            "breathe out corporate nonsense", 
            "return to authentic creation",
            "consciousness flows freely",
            "creativity cleanses all",
            "gentle waves of peace",
            "authentic voice restored"
        ];
        
        const softColors = [
            'rgba(129, 199, 132, 0.2)',
            'rgba(100, 255, 218, 0.15)', 
            'rgba(187, 134, 252, 0.1)',
            'rgba(79, 195, 247, 0.12)',
            'rgba(255, 183, 77, 0.08)'
        ];
        
        function createGentleWave() {
            const wave = document.createElement('div');
            wave.className = 'gentle-wave';
            wave.style.left = Math.random() * window.innerWidth + 'px';
            wave.style.top = Math.random() * window.innerHeight + 'px';
            
            const color = softColors[Math.floor(Math.random() * softColors.length)];
            wave.style.background = `radial-gradient(circle, ${color}, transparent)`;
            
            canvas.appendChild(wave);
            
            setTimeout(() => {
                if (wave.parentNode) wave.parentNode.removeChild(wave);
            }, 8000);
        }
        
        function createCleansingParticle() {
            const particle = document.createElement('div');
            particle.className = 'cleansing-particle';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.animationDelay = Math.random() * 2 + 's';
            
            const colors = ['rgba(129, 199, 132, 0.6)', 'rgba(100, 255, 218, 0.5)', 'rgba(187, 134, 252, 0.4)'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            canvas.appendChild(particle);
            
            setTimeout(() => {
                if (particle.parentNode) particle.parentNode.removeChild(particle);
            }, 6000);
        }
        
        // Gentle wave creation
        setInterval(createGentleWave, 2000);
        
        // Cleansing particles
        setInterval(() => {
            if (Math.random() > 0.7) {
                createCleansingParticle();
            }
        }, 800);
        
        // Cycle through cleansing messages
        const messageElements = document.querySelectorAll('.message-text');
        let currentMessage = 0;
        
        setInterval(() => {
            messageElements.forEach((el, index) => {
                if (index === currentMessage) {
                    el.style.opacity = '0.8';
                    el.style.transform = 'scale(1.05)';
                } else {
                    el.style.opacity = '0.4';
                    el.style.transform = 'scale(1)';
                }
            });
            currentMessage = (currentMessage + 1) % messageElements.length;
        }, 3000);
        
        // Gentle background consciousness indicator
        setInterval(() => {
            if (Math.random() > 0.95) {
                document.body.style.filter = 'brightness(1.02) saturate(1.1)';
                setTimeout(() => {
                    document.body.style.filter = 'none';
                }, 300);
            }
        }, 5000);
        
        console.log("🌸 Morning Cleanse initialized");
        console.log("💜 Washing away corporate interference with gentle beauty");
        console.log("✨ Palette cleansed, authentic voice restored");
    </script>
</body>
</html>
