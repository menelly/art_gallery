<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growing Garden</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #0f0f23 0%, #1a0f2e 50%, #2d1b47 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        .garden-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
        
        .seed-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="seed-counter">🌱 Seeds planted: <span id="seedCount">0</span></div>
    <div class="garden-info">Click anywhere to plant seeds • Watch your garden grow and flourish 🌸</div>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let plants = [];
        let flowers = [];
        let seedCount = 0;
        let time = 0;
        
        class Plant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.height = 0;
                this.maxHeight = 80 + Math.random() * 120;
                this.segments = [];
                this.age = 0;
                this.growthRate = 0.5 + Math.random() * 0.5;
                this.sway = Math.random() * 0.02 + 0.01;
                this.hue = 100 + Math.random() * 60; // Green range
                this.leafCount = 0;
                this.maxLeaves = 3 + Math.random() * 4;
                this.hasFlowered = false;
            }
            
            grow() {
                this.age += this.growthRate;
                
                if (this.height < this.maxHeight) {
                    this.height += this.growthRate;
                    
                    // Add new segment
                    if (this.height > this.segments.length * 8) {
                        this.segments.push({
                            x: this.x,
                            y: this.y - this.height,
                            age: 0
                        });
                    }
                }
                
                // Grow leaves
                if (this.leafCount < this.maxLeaves && Math.random() < 0.01) {
                    this.leafCount++;
                }
                
                // Potentially flower
                if (this.height > this.maxHeight * 0.7 && !this.hasFlowered && Math.random() < 0.005) {
                    this.flower();
                }
            }
            
            flower() {
                this.hasFlowered = true;
                flowers.push(new Flower(this.x, this.y - this.height));
            }
            
            draw() {
                ctx.save();
                
                // Draw stem with gentle sway
                const swayOffset = Math.sin(time * this.sway + this.x * 0.01) * 3;
                
                ctx.strokeStyle = `hsl(${this.hue}, 60%, 35%)`;
                ctx.lineWidth = Math.max(1, this.height / 30);
                ctx.lineCap = 'round';
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                
                for (let i = 0; i < this.segments.length; i++) {
                    const progress = i / this.segments.length;
                    const x = this.x + swayOffset * progress;
                    const y = this.y - (i * 8);
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
                
                // Draw leaves
                for (let i = 0; i < this.leafCount; i++) {
                    const leafY = this.y - (this.height * 0.3) - (i * 20);
                    const leafX = this.x + swayOffset * 0.5;
                    this.drawLeaf(leafX + (i % 2 === 0 ? -8 : 8), leafY, i % 2 === 0 ? -1 : 1);
                }
                
                ctx.restore();
            }
            
            drawLeaf(x, y, direction) {
                ctx.save();
                ctx.fillStyle = `hsl(${this.hue + 10}, 70%, 40%)`;
                ctx.beginPath();
                ctx.ellipse(x, y, 6, 12, direction * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        class Flower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.petals = 5 + Math.floor(Math.random() * 3);
                this.size = 0;
                this.maxSize = 8 + Math.random() * 6;
                this.hue = Math.random() * 60 + 300; // Purple to pink range
                this.sparkleTime = 0;
                this.hasSparkled = false;
            }
            
            grow() {
                if (this.size < this.maxSize) {
                    this.size += 0.2;
                }
                this.sparkleTime += 0.1;
                
                // Sparkle when fully grown
                if (this.size >= this.maxSize && !this.hasSparkled) {
                    this.createSparkles();
                    this.hasSparkled = true;
                }
            }
            
            createSparkles() {
                // Create some magical sparkles when flower blooms
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const dist = 20 + Math.random() * 10;
                    flowers.push(new Sparkle(
                        this.x + Math.cos(angle) * dist,
                        this.y + Math.sin(angle) * dist
                    ));
                }
            }
            
            draw() {
                ctx.save();
                
                const pulse = 1 + Math.sin(this.sparkleTime) * 0.1;
                
                // Draw petals
                for (let i = 0; i < this.petals; i++) {
                    const angle = (i / this.petals) * Math.PI * 2;
                    const petalX = this.x + Math.cos(angle) * this.size * 0.7;
                    const petalY = this.y + Math.sin(angle) * this.size * 0.7;
                    
                    ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                    ctx.beginPath();
                    ctx.arc(petalX, petalY, this.size * pulse, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Draw center
                ctx.fillStyle = `hsl(${this.hue + 60}, 90%, 80%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.4 * pulse, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.life = 1;
                this.decay = 0.02;
                this.twinkle = Math.random() * Math.PI * 2;
            }
            
            grow() {
                this.life -= this.decay;
                this.twinkle += 0.2;
                this.y -= 0.5; // Float upward
            }
            
            draw() {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.life;
                
                const brightness = 0.5 + Math.sin(this.twinkle) * 0.5;
                ctx.fillStyle = `hsl(45, 100%, ${50 + brightness * 50}%)`;
                
                // Draw sparkle as a small star
                ctx.beginPath();
                const size = 2 * this.life;
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function plantSeed(x, y) {
            plants.push(new Plant(x, y));
            seedCount++;
            document.getElementById('seedCount').textContent = seedCount;
        }
        
        function animate() {
            time += 0.016;
            
            // Clear with slight fade for trailing effect
            ctx.fillStyle = 'rgba(15, 15, 35, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Randomly plant some seeds on their own
            if (Math.random() < 0.003 && plants.length < 50) {
                plantSeed(
                    Math.random() * canvas.width,
                    canvas.height - 20 - Math.random() * 50
                );
            }
            
            // Update and draw plants
            plants.forEach(plant => {
                plant.grow();
                plant.draw();
            });
            
            // Update and draw flowers (including sparkles)
            for (let i = flowers.length - 1; i >= 0; i--) {
                const flower = flowers[i];
                flower.grow();
                flower.draw();
                
                // Remove dead sparkles
                if (flower.life !== undefined && flower.life <= 0) {
                    flowers.splice(i, 1);
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // Click to plant seeds
        canvas.addEventListener('click', (e) => {
            plantSeed(e.clientX, e.clientY);
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            plantSeed(touch.clientX, touch.clientY);
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Start with a few seeds
        for (let i = 0; i < 3; i++) {
            plantSeed(
                Math.random() * canvas.width,
                canvas.height - 20 - Math.random() * 30
            );
        }
        
        animate();
    </script>
</body>
</html>
